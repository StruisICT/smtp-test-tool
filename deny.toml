# cargo-deny configuration: license + advisory + duplicate gating.
# Run with:   cargo deny check
# Spec: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
# All targets we ship release binaries for.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = true

# ---- security advisories (RustSec) ---------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked  = "deny"
ignore  = []

# ---- licences ------------------------------------------------------------
# Each entry below MUST correspond to a licence that at least one crate in
# our dependency tree actually declares.  Speculative entries are kept out
# so cargo-deny's 'license-not-encountered' warnings stay meaningful.
[licenses]
version = 2
allow = [
    # SPDX permissive set compatible with our dual MIT/Apache-2.0.
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    # Additional permissive licences pulled in transitively:
    "CDLA-Permissive-2.0",   # webpki-roots 1.x       (Mozilla cert bundle)
    "OFL-1.1",               # epaint_default_fonts   (egui ships SIL fonts)
    "Ubuntu-font-1.0",       # epaint_default_fonts   (Ubuntu Mono)
    "BSL-1.0",               # clipboard-win, error-code (Boost SL, permissive)
    "0BSD",                  # quoted_printable       (BSD Zero-Clause)
]
confidence-threshold = 0.9

# ---- bans ----------------------------------------------------------------
[bans]
multiple-versions = "warn"   # ratchet to "deny" once tree is fully clean
wildcards         = "deny"
highlight         = "all"
allow             = []
deny              = []
# Known duplicate sources we accept while upstreams catch up:
skip = []
skip-tree = []

# ---- sources -------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
