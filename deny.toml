# cargo-deny configuration: license + advisory + duplicate gating.
# Run with:   cargo deny check
# Spec: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
# All targets we ship release binaries for.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = true

# ---- security advisories (RustSec) ---------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked  = "deny"
ignore  = []

# ---- licences ------------------------------------------------------------
[licenses]
version = 2
# Permissive set compatible with our dual-MIT/Apache-2.0 licence.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "OpenSSL",         # ring's licence file pattern
]
confidence-threshold = 0.9

# Specific crate exceptions (only when justified).
[[licenses.clarify]]
name      = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---- bans ----------------------------------------------------------------
[bans]
multiple-versions = "warn"   # ratchet to "deny" once tree is fully clean
wildcards         = "deny"
highlight         = "all"
allow             = []
deny              = []
# Known duplicate sources we accept while upstreams catch up:
skip = []
skip-tree = []

# ---- sources -------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
