name: Release

# Triggered by pushing a semver tag, e.g.:
#   git tag -a v0.1.0 -m "v0.1.0"
#   git push origin v0.1.0
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag (e.g. v0.1.0) - used only for manual reruns"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write           # create GitHub Release + upload assets

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:

  # -------------------------------------------------------------------
  # Build the static binaries on each target OS.
  # -------------------------------------------------------------------
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          # Apple Silicon runner builds the native aarch64 binary.
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          # GitHub deprecated the macos-12 / macos-13 (Intel) runner
          # pools.  We cross-compile the x86_64 Mac binary from the
          # Apple-Silicon runner instead - cargo + rustup handle this
          # natively via the additional 'targets' entry, no extra
          # tooling needed for Rust-pure code.
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux GUI build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libfontconfig-dev

      - name: cargo build --release
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          NAME="smtp-test-tool-${{ matrix.target }}"
          mkdir -p "dist/$NAME"
          cp target/${{ matrix.target }}/release/smtp-test-tool          "dist/$NAME/"
          cp target/${{ matrix.target }}/release/smtp-test-tool-gui      "dist/$NAME/"
          cp README.md LICENSE-MIT LICENSE-APACHE CHANGELOG.md           "dist/$NAME/"
          cd dist
          tar -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "smtp-test-tool-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/smtp-test-tool.exe"      "dist/$name/"
          Copy-Item "target/${{ matrix.target }}/release/smtp-test-tool-gui.exe"  "dist/$name/"
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE, CHANGELOG.md         "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -FilePath "dist/$name.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Attach every archive to a GitHub Release.
  # -------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release + upload assets
      id-token: write       # OIDC token used to sign the provenance
      attestations: write   # write the build-provenance attestation
    steps:
      - uses: actions/checkout@v6
      # SemVer gate (AGENTS.md §6): the binary release must not ship
      # unless the tag, Cargo.toml, and a CHANGELOG section all agree.
      # Step-level `if` so manual workflow_dispatch reruns (no tag ref)
      # still work.
      - name: Verify version consistency
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VER"
            exit 1
          fi
          if ! grep -qE "^## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG]' section for this release"
            exit 1
          fi
          echo "OK: v$TAG is consistent across tag, Cargo.toml, and CHANGELOG."
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -mindepth 2 -type f -exec mv {} release/ \;
          ls -la release/
      # Verifiable SLSA build provenance for every shipped archive.  This
      # is a security tool that handles live credentials, so users can run
      #   gh attestation verify <file> --repo StruisICT/smtp-test-tool
      # to confirm a download was built by this workflow and not tampered
      # with.  Free; signs via GitHub's OIDC + Sigstore, nothing to host.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release/*.tar.gz
            release/*.zip
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  # -------------------------------------------------------------------
  # Publish library + binaries to crates.io.
  #
  # ENABLEMENT: set the CARGO_REGISTRY_TOKEN repo secret first.  Until
  # that secret exists this job will fail in a non-blocking way (the
  # binary release above will still publish).
  # -------------------------------------------------------------------
  publish:
    name: crates.io publish
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libfontconfig-dev
      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VER"
            exit 1
          fi
          if ! grep -qE "^## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG]' section for this release"
            exit 1
          fi
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --all-features

  # -------------------------------------------------------------------
  # Refresh packaging/ manifests (WinGet / Scoop / Homebrew) with the
  # new version + SHA-256 hashes, then commit them back to main.
  #
  # This runs LAST so the manifests on main always point at a release
  # that actually exists.  We do not auto-PR to the upstream manifest
  # registries (microsoft/winget-pkgs etc.) - the maintainer does that
  # by hand using these now-correct files as the source.
  # -------------------------------------------------------------------
  refresh-manifests:
    name: Refresh package manifests
    needs: [release, publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Flatten + extract SHA-256s
        id: hashes
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -mindepth 2 -type f -exec mv {} release/ \;
          # Each .sha256 sidecar contains "<hash>  <filename>".
          read_hash() { awk '{print $1}' "release/$1.sha256"; }
          {
            echo "win_zip=$(read_hash smtp-test-tool-x86_64-pc-windows-msvc.zip)"
            echo "linux_gnu=$(read_hash smtp-test-tool-x86_64-unknown-linux-gnu.tar.gz)"
            echo "mac_arm=$(read_hash smtp-test-tool-aarch64-apple-darwin.tar.gz)"
            echo "mac_x86=$(read_hash smtp-test-tool-x86_64-apple-darwin.tar.gz)"
          } >> "$GITHUB_OUTPUT"
      - name: Patch manifests
        env:
          VERSION:   ${{ github.ref_name }}   # e.g. v0.1.6
          WIN_ZIP:   ${{ steps.hashes.outputs.win_zip }}
          LINUX_GNU: ${{ steps.hashes.outputs.linux_gnu }}
          MAC_ARM:   ${{ steps.hashes.outputs.mac_arm }}
          MAC_X86:   ${{ steps.hashes.outputs.mac_x86 }}
        run: |
          set -euo pipefail
          # Export so the python heredocs further down inherit it via
          # os.environ.  WIN_ZIP / MAC_* / LINUX_GNU come in via env:
          # so they are already exported by the action runner.
          export VER="${VERSION#v}"   # strip 'v' for non-tag contexts
          TODAY=$(date -u +%Y-%m-%d)

          # ---- WinGet (3 YAMLs) ------------------------------------
          # NB: package identifier is 'StruisICT.SmtpTestTool' - the
          # release brand, distinct from the maintainer's GitHub user account
          # that owns the upstream repository.
          for f in packaging/winget/StruisICT.SmtpTestTool.installer.yaml \
                   packaging/winget/StruisICT.SmtpTestTool.locale.en-US.yaml \
                   packaging/winget/StruisICT.SmtpTestTool.yaml; do
            sed -i "s/^PackageVersion: .*/PackageVersion: $VER/" "$f"
          done
          sed -i "s|/download/v[0-9.]*/|/download/v$VER/|g" packaging/winget/StruisICT.SmtpTestTool.installer.yaml
          sed -i "s/InstallerSha256: .*/InstallerSha256: $WIN_ZIP/"   packaging/winget/StruisICT.SmtpTestTool.installer.yaml
          sed -i "s/^ReleaseDate: .*/ReleaseDate: $TODAY/"            packaging/winget/StruisICT.SmtpTestTool.installer.yaml

          # ---- Scoop ----------------------------------------------
          # Quoted 'PY' heredoc so bash leaves backslashes alone.
          python3 - <<'PY'
          import json, os
          ver  = os.environ['VER']
          p    = 'packaging/scoop/smtp-test-tool.json'
          d    = json.load(open(p))
          d['version'] = ver
          d['architecture']['64bit']['url']  = (
              f"https://github.com/StruisICT/smtp-test-tool/releases/download/v{ver}"
              f"/smtp-test-tool-x86_64-pc-windows-msvc.zip"
          )
          d['architecture']['64bit']['hash'] = os.environ['WIN_ZIP']
          json.dump(d, open(p, 'w'), indent=2)
          open(p, 'a').write('\n')
          PY

          # ---- Homebrew -------------------------------------------
          F=packaging/homebrew/smtp-test-tool.rb
          sed -i "s/version \"[^\"]*\"/version \"$VER\"/" "$F"
          # Two small, indent-preserving substitutions per target.
          # We deliberately use \g<N> backref syntax to avoid the \\1
          # -> \x01 trap that bash + python string-literal escaping
          # falls into for plain \1 references in heredocs.
          python3 - <<'PY'
          import re, os
          p = 'packaging/homebrew/smtp-test-tool.rb'
          src = open(p).read()
          ver = os.environ['VER']
          subs = [
            ('aarch64-apple-darwin',     os.environ['MAC_ARM']),
            ('x86_64-apple-darwin',      os.environ['MAC_X86']),
            ('x86_64-unknown-linux-gnu', os.environ['LINUX_GNU']),
          ]
          for tgt, h in subs:
            # 1) Bump the version inside the URL for this target.
            src = re.sub(
              r'(https://github\.com/StruisICT/smtp-test-tool/releases/download/)v[0-9.]+(/smtp-test-tool-'
              + re.escape(tgt) + r'\.tar\.gz)',
              rf'\g<1>v{ver}\g<2>',
              src,
            )
            # 2) Replace the sha256 hash that follows the matching
            #    URL.  Indentation around `sha256` is outside the
            #    capture so it is preserved verbatim.
            src = re.sub(
              r'(/v' + re.escape(ver) + r'/smtp-test-tool-'
              + re.escape(tgt) + r'\.tar\.gz"\s*\n\s*sha256 ")'
              r'[0-9a-f]+(")',
              rf'\g<1>{h}\g<2>',
              src,
            )
          open(p, 'w').write(src)
          PY

          echo '--- result ---'
          git diff --stat packaging/
      - name: Commit + push
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet packaging/; then
            echo 'No manifest changes - skipping commit.'
            exit 0
          fi
          git add packaging/
          git commit -m "chore(packaging): refresh manifests for $VERSION" \
                     -m "Auto-generated by .github/workflows/release.yml after the" \
                     -m "$VERSION binaries were attached to the GitHub Release." \
                     -m "" \
                     -m "[skip ci]"
          git push origin HEAD:main
