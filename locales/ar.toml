hint = "فشل تسجيل الدخول الأولي 'Mail sturen als' (Send mail as) في Gmail. الإعدادات > عرض جميع الإعدادات > الحسابات والاستيراد > إرسال البريد باسم > تحرير المعلومات > أعد إدخال كلمة مرور SMTP (أو app-password إذا كان الحساب المصدر يحتوي على 2FA)."

