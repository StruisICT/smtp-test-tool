security_starttls = "starttls"
security_ssl = "ssl"

[ui.send]
toggle = "Enviar realmente un mensaje de prueba (si no, solo se prueba AUTH)"
mail_from = "MAIL FROM (sobre):"
from_header = "From: (cabecera):"
to = "Para (separados por comas):"
cc = "Cc (separados por comas):"
bcc = "Cco (separados por comas):"
reply_to = "Responder a:"
subject = "Asunto:"
body = "Contenido:"

