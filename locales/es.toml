forget_keychain = "Olvidar entrada del llavero"
forget_keychain_tooltip = "Borra la entrada smtp-test-tool para este usuario del llavero del SO.  El campo de contraseña anterior también se limpia."
loaded_from_keychain = "(cargado desde el llavero)"

[ui.proto]
test_smtp = "Probar SMTP"
test_imap = "Probar IMAP"
test_pop3 = "Probar POP3"
host = "Host:"
port = "Puerto:"
security = "Seguridad:"
