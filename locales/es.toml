# smtp-test-tool locale: Español (es)
#
# status: machine-translated, native review welcome
# Open a PR against locales/es.toml to fix awkward phrasing.
# Technical terms kept in English on purpose.

[app]
name = "SMTP Test Tool"

[locale]
native_name = "Español"
english_name = "Spanish"
status_note = "Traducción automática - revisión por hablante nativo bienvenida."

[ui.window]
title = "SMTP Test Tool"

[ui.topbar]
profile_label = "Perfil:"
