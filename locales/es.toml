provider_preset_tooltip = "Aplica uno de los preajustes de proveedores curados a los campos host / puerto / seguridad de abajo."
config_path_none = "sin archivo de configuración"

[ui.tab]
servers = "Servidores"
send_mail = "Enviar correo"
tls_auth = "TLS / Auth"
advanced = "Avanzado"
diagnose = "Analizar rechazo"

[ui.servers]
username = "Usuario:"
