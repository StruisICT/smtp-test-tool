# smtp-test-tool locale: Deutsch (de)
#
# status: machine-translated, native review welcome
# Open a PR against locales/de.toml to fix any awkward phrasing.
# Technical terms (SMTP AUTH, App-Passwort, Conditional Access,
# STARTTLS, XOAUTH2, MAIL FROM) are kept in English by design - that
# matches what users see in Microsoft 365 admin panels.

[app]
name = "SMTP Test Tool"

[locale]
native_name = "Deutsch"
english_name = "German"
status_note = "Maschinelle Übersetzung - Muttersprachler-Review willkommen."

[ui.window]
title = "SMTP Test Tool"

