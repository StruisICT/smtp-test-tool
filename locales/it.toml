[ui.diagnose]
intro = "Incolla qui sotto il corpo di un messaggio di non recapito per estrarre suggerimenti azionabili dall'IT.  Riconosce gli SMTP enhanced status code (5.7.139, 5.7.60), le frasi Microsoft 365 (\"basic authentication is disabled\") e i bounce lato webmail come \"Send mail as / Mail sturen als\" di Gmail.  Nulla viene inviato in rete e il testo non viene salvato su disco."
input_placeholder = "Incolla qui il contenuto del bounce..."
analyse = "Analizza"
clear = "Pulisci"
hints_heading = "Suggerimenti"
no_hints_yet = "(nessun suggerimento ancora - incolla un bounce sopra e fai clic su Analizza)"

[ui.log]
heading = "Log"

[diagnostics.scaffold]
esc_prefix = "ESC {code}: {what}"
action_prefix = "  -> Azione: {fix}"
hint_prefix = "  -> {hint}"

[diagnostics.smtp.esc.5_7_0]
what = "Autenticazione richiesta, o il meccanismo AUTH scelto non è permesso."
fix  = "Abilita SMTP AUTH per la casella; verifica che LOGIN / PLAIN / XOAUTH2 sia permesso."

[diagnostics.smtp.esc.5_7_1]
what = "Accesso relay negato - il server rifiuta di inoltrare questo messaggio."
fix  = "O il mittente non è autenticato, il destinatario è esterno e il relay è disabilitato, o una transport rule blocca il messaggio."

[diagnostics.smtp.esc.5_7_3]
what = "Autenticazione fallita."
fix  = "Password errata, MFA attivo senza app-password, o Basic/Legacy auth disabilitato sul tenant (O365: 'SMTP AUTH disabled')."

[diagnostics.smtp.esc.5_7_8]
what = "Credenziali di autenticazione non valide."
fix  = "Utente/password rifiutato dal layer SASL."

[diagnostics.smtp.esc.5_7_57]
what = "Client non autenticato per inviare posta anonima durante MAIL FROM."
fix  = "Forza STARTTLS + AUTH prima di MAIL FROM.  In O365 è l'errore tipico quando il client si connette senza AUTH."

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - l'utente autenticato non è autorizzato a inviare COME questo indirizzo From."
fix  = "Concedi alla casella i diritti 'Send As' (o 'Send on Behalf') per l'account autenticato, o cambia l'intestazione From per farla corrispondere al login."

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied."
fix  = "L'invio SMTP autenticato richiede una casella con licenza in O365."

[diagnostics.smtp.esc.5_7_124]
what = "L'utente non è autorizzato a inviare posta."
fix  = "Casella disabilitata, bloccata da Conditional Access, o licenza mancante."

[diagnostics.smtp.esc.5_7_135]
what = "Autenticazione fallita, le credenziali utente sono scadute."
fix  = "Reimposta la password / rinnova il token OAuth."

[diagnostics.smtp.esc.5_7_139]
what = "Autenticazione fallita; la richiesta non ha soddisfatto i criteri."
fix  = "Una policy Conditional Access ha negato il login (posizione, dispositivo, MFA)."

[diagnostics.smtp.esc.5_7_500]
what = "Accesso negato, dominio mittente disabilitato."
fix  = "Il dominio del mittente è bloccato per la posta in uscita su questo tenant."

[diagnostics.smtp.esc.5_7_501]
what = "Accesso negato, mittente bannato."
fix  = "L'indirizzo del mittente è in una blocklist del tenant."

[diagnostics.smtp.esc.5_7_508]
what = "Accesso negato, soglia di velocità o traffico superata."
fix  = "Throttled; attendi e riprova, o chiedi all'admin di alzare il limite."

[diagnostics.smtp.esc.5_7_511]
what = "Accesso negato, mittente bannato."
fix  = "Mittente segnalato come fonte di spam."

[diagnostics.smtp.esc.5_7_606]
what = "Accesso negato, IP mittente bannato."
fix  = "L'IP di invio è in una blocklist Microsoft."

[diagnostics.smtp.esc.5_7_708]
what = "Servizio rifiutato.  L'IP sorgente ha cattiva reputazione."
fix  = "Invia da un altro IP o richiedi la rimozione dalla blocklist."

[diagnostics.smtp.esc.5_7_750]
what = "Client bloccato dall'inviare da domini non registrati."
fix  = "Verifica il dominio del mittente nel tenant o usa un dominio accettato."

[diagnostics.smtp.esc.5_1_0]
what = "Indirizzo mittente rifiutato."
fix  = "From/MAIL FROM non accettato; di solito formato o policy di dominio."

[diagnostics.smtp.esc.5_1_1]
what = "Casella di destinazione errata - il destinatario non esiste."
fix  = "Controlla l'indirizzo del destinatario."

[diagnostics.smtp.esc.5_1_7]
what = "Indirizzo mittente non valido (malformato)."
fix  = "Correggi la sintassi di MAIL FROM."

[diagnostics.smtp.esc.5_1_8]
what = "Dominio mittente non consentito."
fix  = "Dominio non accettato dal server."

[diagnostics.smtp.esc.5_1_10]
what = "Indirizzo destinatario rifiutato - utente sconosciuto."
fix  = "Errore di battitura o destinatario inesistente."

[diagnostics.smtp.esc.5_4_1]
what = "Indirizzo destinatario rifiutato: accesso negato."
fix  = "La casella del destinatario rifiuta messaggi da questo mittente / dominio."

[diagnostics.smtp.esc.5_2_1]
what = "Casella disabilitata, non accetta messaggi."
fix  = "Casella del destinatario sospesa."

[diagnostics.smtp.esc.5_2_2]
what = "Casella piena."
fix  = "Quota del destinatario superata."

[diagnostics.smtp.esc.5_3_4]
what = "Messaggio troppo grande per il sistema."
fix  = "Riduci la dimensione del messaggio."

[diagnostics.smtp.esc.4_7_0]
what = "Fallimento temporaneo dell'autenticazione / throttling."
fix  = "Riprova più tardi; può anche essere un tarpit per login errati ripetuti."

[diagnostics.smtp.esc.4_4_2]
what = "Connessione interrotta."
fix  = "Glitch di rete o riavvio del server; riprova."

[diagnostics.smtp.esc.4_3_2]
what = "Il sistema non accetta messaggi di rete."
fix  = "Manutenzione del server."

[diagnostics.imap.AUTHENTICATIONFAILED]
hint = "Login IMAP rifiutato - password errata, MFA senza app-password, o Basic Auth disabilitato."

[diagnostics.imap."LOGIN_failed"]
hint = "Login IMAP rifiutato dal server."

[diagnostics.imap.ALERT]
hint = "Il server ha restituito una risposta ALERT - leggila; messaggio definito dall'amministratore."

[diagnostics.imap.UNAVAILABLE]
hint = "Casella/server temporaneamente non disponibile."

[diagnostics.imap.PRIVACYREQUIRED]
hint = "Il server richiede TLS prima di LOGIN - usa STARTTLS o SSL implicito."

[diagnostics.imap.CLIENTBUG]
hint = "Il client ha fatto qualcosa che il server considera sbagliato; di solito STARTTLS mancante o stato errato."

[diagnostics.imap.LOGINDISABLED]
hint = "Plain LOGIN è disabilitato su questo server - usa STARTTLS/SSL o XOAUTH2."

[diagnostics.pop.authentication_failed]
hint = "Login POP3 rifiutato - credenziali errate o POP disabilitato per questa casella."

[diagnostics.pop.logon_failure]
hint = "Login POP3 rifiutato."

[diagnostics.pop.not_implemented]
hint = "Il server non supporta il comando emesso."

[diagnostics.pop.disabled]
hint = "L'accesso POP3 è disabilitato per questo account / tenant."

[diagnostics.bounce.gmail_send_as_en]
needle = "Send mail as"
hint = "Login upstream 'Send mail as' di Gmail fallito.  Impostazioni > Visualizza tutte le impostazioni > Account e importazione > Invia messaggi come > Modifica informazioni > reinserisci la password SMTP (o un app-password se l'account di origine ha la 2FA)."

[diagnostics.bounce.gmail_send_as_nl]
needle = "Mail sturen als"
hint = "Login upstream 'Mail sturen als' (Send mail as) di Gmail fallito.  Impostazioni > Visualizza tutte le impostazioni > Account e importazione > Invia messaggi come > Modifica informazioni > reinserisci la password SMTP (o un app-password se l'account di origine ha la 2FA)."

[cli.prompt]
username = "Nome utente / email: "
password = "Password: "
