# smtp-test-tool locale: English (en)
#
# Base language file.  Every key the application looks up MUST exist
# here.  Other locale files only need to translate the keys they want
# to ship; missing keys fall back to English at runtime.
#
# Section layout:
#   locale.*       metadata about THIS locale file (native name etc.)
#   ui.*           on-screen labels, buttons, tab names, tooltips
#   diagnostics.*  hint strings produced by smtp_hints_for / friends
#   cli.*          prompts and small CLI-only strings
#   app.*          tool-wide constants
#   test.*         fixtures used by the i18n unit tests

[app]
name = "SMTP Test Tool"

[locale]
# Human-readable language name in the language itself - shown in the
# selector even when the active locale is NOT this one.
native_name = "English"
# English name; shown alongside native_name for clarity (e.g.
# 'Nederlands (Dutch)' is friendlier to a US English admin than 'Nederlands').
english_name = "English"
# Status banner shown in the selector for non-base locales when their
# strings have not been native-reviewed.  Empty for en (this IS the base).
status_note = ""

[test.fixture]
greeting = "Hello, {name}!"

